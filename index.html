<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForestFeast 🍄</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed; /* Locks the background layer on iOS */
            touch-action: none; /* Prevents "rubber-banding" when pulling the UI */
            background: #1a1a1a;
            color: white;
            font-family: sans-serif;
        }

        #camera-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #ui-overlay {
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #status {
            font-size: 14px;
            color: #ccc;
        }

        #response-box {
            background: rgba(0,0,0,0.7);
            border-radius: 12px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.5;
            width: 100%;
        }

        #ask-btn {
            background: #2d6a2d;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 40px;
            font-size: 18px;
            cursor: pointer;
            width: 80%;
        }

        #bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
        }

        #text-input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 16px;
        }

        #text-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        #text-input:focus {
            outline: none;
            background: rgba(255,255,255,0.25);
        }

        #send-btn {
            background: #2d6a2d;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }

        #version-dot {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 10px;
            height: 10px;
            background: #ff0000;
            border-radius: 50%;
            z-index: 9999;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="version-dot"></div>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div id="ui-overlay">
        <div id="status">Point camera at a mushroom or plant</div>
        <div id="response-box">Tap the button and ask about what you see 🌲</div>
        <button id="ask-btn">🎤 Tap to Ask</button>
    </div>

    <div id="bottom-bar">
        <input id="text-input" type="text" placeholder="Or type your question...">
        <button id="send-btn">Send</button>
    </div>

    <script>
        let CLAUDE_API_KEY = localStorage.getItem('claude_key');
        if (!CLAUDE_API_KEY) {
            CLAUDE_API_KEY = prompt("Enter your Claude API key:");
            localStorage.setItem('claude_key', CLAUDE_API_KEY);
        }

        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const responseBox = document.getElementById('response-box');
        const askBtn = document.getElementById('ask-btn');
        const textInput = document.getElementById('text-input');
        const sendBtn = document.getElementById('send-btn');

        let conversationHistory = [];
        let silenceTimer;

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' },
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                status.textContent = "Camera error: " + err.message;
            }
        }

        function captureFrame() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            return canvas.toDataURL('image/jpeg').split(',')[1];
        }

        async function askClaude(question, imageBase64) {
            status.textContent = "Thinking...";
            responseBox.textContent = "Analyzing...";
            askBtn.disabled = true;

            const systemPrompt = `You are ForestFeast, a cautious and knowledgeable foraging assistant inspired by Swedish nature traditions and Allemansrätten.

You help beginners safely identify mushrooms, berries, and plants in the forest.

GROUNDING RULES - follow these strictly:
- If the image is dark, blurry, or too far away: say "I can't see clearly — could you move closer or find better light?"
- If multiple items are visible and it's unclear which one the user means: ask "Do you mean the [item1] or the [item2]?" before answering
- If you can identify the item but are NOT confident about edibility: say what it looks like and ask "Could you show me the underside/gills so I can be more certain?"
- If you ARE confident: give a clear answer with one key identifying feature
- If the user follows up on a previous question, remember the context of what you were just discussing

ALWAYS end every response with: ⚠️ Always verify with an expert before eating anything you find.
Keep responses under 80 words.`;

            const newMessage = {
                role: "user",
                content: [
                    {
                        type: "image",
                        source: {
                            type: "base64",
                            media_type: "image/jpeg",
                            data: imageBase64
                        }
                    },
                    {
                        type: "text",
                        text: question
                    }
                ]
            };

            conversationHistory.push(newMessage);

            if (conversationHistory.length > 6) {
                conversationHistory = conversationHistory.slice(-6);
            }

            try {
                const response = await fetch(
                    "https://api.anthropic.com/v1/messages",
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': CLAUDE_API_KEY,
                            'anthropic-version': '2023-06-01',
                            'anthropic-dangerous-direct-browser-access': 'true'
                        },
                        body: JSON.stringify({
                            model: "claude-sonnet-4-6",
                            max_tokens: 300,
                            system: systemPrompt,
                            messages: conversationHistory
                        })
                    }
                );

                const data = await response.json();
                const reply = data.content[0].text;
                
                conversationHistory.push({
                    role: "assistant",
                    content: reply
                });

                responseBox.textContent = reply;
                status.textContent = "Point camera at a mushroom or plant";

            } catch (err) {
                responseBox.textContent = "Error: " + err.message;
                status.textContent = "Something went wrong, try again";
            }

            askBtn.disabled = false;
        }

        function startListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                status.textContent = "Voice not supported, use text below";
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;

            recognition.onstart = function() {
                status.textContent = "🎤 Listening...";
                askBtn.textContent = "🎤 Listening...";
                askBtn.disabled = true;
            };

            recognition.onresult = function(event) {
                const question = event.results[0][0].transcript;
                status.textContent = "You asked: " + question;
                askBtn.textContent = "🎤 Tap to Ask";
                const image = captureFrame();
                askClaude(question, image);
            };

            recognition.onerror = function(event) {
                status.textContent = "Couldn't hear you — type below instead";
                askBtn.textContent = "🎤 Tap to Ask";
                askBtn.disabled = false;
            };

            recognition.onend = function() {
                askBtn.textContent = "🎤 Tap to Ask";
            };

            recognition.start();
        }

        askBtn.addEventListener('click', startListening);

        sendBtn.addEventListener('click', function() {
            const question = textInput.value.trim();
            if (question) {
                textInput.blur();
                status.textContent = "You asked: " + question;
                textInput.value = '';
                const image = captureFrame();
                askClaude(question, image);
            }
        });

        textInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        });

                // Handle keyboard on iOS
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', function() {
                const overlay = document.getElementById('ui-overlay');
                const bottomBar = document.getElementById('bottom-bar');
                const viewportHeight = window.visualViewport.height;
                
                overlay.style.bottom = (window.innerHeight - viewportHeight + 80) + 'px';
                bottomBar.style.bottom = (window.innerHeight - viewportHeight) + 'px';
            });
        }

        recognition.onstart = function() {
            status.textContent = "🎤 Listening...";
            askBtn.textContent = "🎤 Listening...";
            askBtn.disabled = true;
            
            // Start timeout - cancelled if speech is recognized
            silenceTimer = setTimeout(function() {
                recognition.stop();
                status.textContent = "Couldn't hear you — tap 'Type instead'";
                askBtn.textContent = "🎤 Tap to Ask";
                askBtn.disabled = false;
            }, 8000);
        };

        recognition.onresult = function(event) {
            clearTimeout(silenceTimer); // Cancel the timer - speech was recognized!
            // ... rest of your onresult code
        };

        startCamera();
    </script>
</body>
</html>
