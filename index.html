<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>ForestFeast 🍄</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: white; font-family: sans-serif; }
        
        #camera-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
                
        #ui-overlay {
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        #status {
            font-size: 14px;
            color: #ccc;
        }

        #ask-btn {
            background: #2d6a2d;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 40px;
            font-size: 18px;
            cursor: pointer;
            width: 80%;
        }

        #response-box {
            background: rgba(0,0,0,0.7);
            border-radius: 12px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.5;
            width: 100%;
        }
        #text-fallback input:focus {
            outline: none;
        }
        #camera-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        html, body {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    
    <div id="version-dot" style="position:fixed; top:20px; right:20px; width:10px; height:10px; background:#0000ff; border-radius:50%; z-index:9999; opacity:0.8;"></div>
    <!-- above is a dot turn it on and off to test changes -->
    
    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        
        <div id="ui-overlay">
            <div id="status">Point camera at a mushroom or plant</div>
            <div id="response-box">Tap the button and ask about what you see 🌲</div>
            <button id="ask-btn">🎤 Tap to Ask</button>
            <div id="text-fallback" style="width:80%; display:flex; gap:8px; margin-top:4px;">
                <input id="text-input" type="text" placeholder="Or type here..." 
                    inputmode="search"
                    style="flex:1; padding:10px; border-radius:20px; border:none; background:rgba(255,255,255,0.2); color:white; font-size:14px;">
                <button id="send-btn" style="background:#2d6a2d; color:white; border:none; border-radius:20px; padding:10px 16px; cursor:pointer;">Send</button>
            </div>
        </div>
    </div>

 <script>
    let CLAUDE_API_KEY = localStorage.getItem('claude_key');
    if (!CLAUDE_API_KEY) {
        CLAUDE_API_KEY = prompt("Enter your Claude API key:");
        localStorage.setItem('claude_key', CLAUDE_API_KEY);
    }

    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const responseBox = document.getElementById('response-box');
    const askBtn = document.getElementById('ask-btn');

    // Conversation history - this is the memory
    let conversationHistory = [];

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment' },
                audio: false 
            });
            video.srcObject = stream;
            status.textContent = "Point camera at a mushroom or plant";
        } catch (err) {
            status.textContent = "Camera error: " + err.message;
        }
    }

    function captureFrame() {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        return canvas.toDataURL('image/jpeg').split(',')[1];
    }

    async function askClaude(question, imageBase64) {
        status.textContent = "Thinking...";
        responseBox.textContent = "Analyzing...";

        const systemPrompt = `You are ForestFeast, a cautious and knowledgeable foraging assistant inspired by Swedish nature traditions and Allemansrätten.

You help beginners safely identify mushrooms, berries, and plants in the forest.

GROUNDING RULES - follow these strictly:
- If the image is dark, blurry, or too far away: say "I can't see clearly — could you move closer or find better light?"
- If multiple items are visible and it's unclear which one the user means: ask "Do you mean the [item1] or the [item2]?" before answering
- If you can identify the item but are NOT confident about edibility: say what it looks like and ask "Could you show me the underside/gills so I can be more certain?"
- If you ARE confident: give a clear answer with one key identifying feature
- If the user follows up on a previous question, remember the context of what you were just discussing

ALWAYS end every response with: ⚠️ Always verify with an expert before eating anything you find.
Keep responses under 80 words.`;

        // Add the new user message with image to history
        const newMessage = {
            role: "user",
            content: [
                {
                    type: "image",
                    source: {
                        type: "base64",
                        media_type: "image/jpeg",
                        data: imageBase64
                    }
                },
                {
                    type: "text",
                    text: question
                }
            ]
        };

        conversationHistory.push(newMessage);

        // Keep only last 6 messages to avoid token limits
        if (conversationHistory.length > 6) {
            conversationHistory = conversationHistory.slice(-6);
        }

        try {
            const response = await fetch(
                "https://api.anthropic.com/v1/messages",
                {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': CLAUDE_API_KEY,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-6",
                        max_tokens: 300,
                        system: systemPrompt,
                        messages: conversationHistory
                    })
                }
            );

            const data = await response.json();
            const reply = data.content[0].text;
            
            // Add Claude's response to history
            conversationHistory.push({
                role: "assistant",
                content: reply
            });

            responseBox.textContent = reply;
            status.textContent = "Point camera at a mushroom or plant";

        } catch (err) {
            responseBox.textContent = "Error: " + err.message;
            status.textContent = "Something went wrong, try again";
        }
    }

    function startListening() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            status.textContent = "Voice not supported, analyzing image...";
            const image = captureFrame();
            askClaude("Is this safe to eat? What is it?", image);
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        recognition.onstart = function() {
            status.textContent = "🎤 Listening...";
            askBtn.textContent = "🎤 Listening...";
            askBtn.disabled = true;
        };

        recognition.onresult = function(event) {
            const question = event.results[0][0].transcript;
            status.textContent = "You asked: " + question;
            askBtn.textContent = "🎤 Tap to Ask";
            askBtn.disabled = false;
            const image = captureFrame();
            askClaude(question, image);
        };

        recognition.onerror = function(event) {
            status.textContent = "Couldn't hear you - try again";
            askBtn.textContent = "🎤 Tap to Ask";
            askBtn.disabled = false;
        };

        recognition.onend = function() {
            askBtn.textContent = "🎤 Tap to Ask";
            askBtn.disabled = false;
        };

        recognition.start();
    }

    askBtn.addEventListener('click', startListening);
    document.getElementById('send-btn').addEventListener('click', function() {
    const input = document.getElementById('text-input');
    const question = input.value.trim();
    if (question) {
        status.textContent = "You asked: " + question;
        input.value = '';
        const image = captureFrame();
        askClaude(question, image);
        }
    });
    // Prevent keyboard from shifting UI
    window.addEventListener('focusin', function() {
        document.getElementById('ui-overlay').style.position = 'fixed';
        document.getElementById('ui-overlay').style.bottom = '10px';
    });

    window.addEventListener('focusout', function() {
        document.getElementById('ui-overlay').style.position = 'absolute';
        document.getElementById('ui-overlay').style.bottom = '10px';
    });
    startCamera();
</script>
</body>
</html>
